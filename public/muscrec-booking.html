<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Booking - MUSCREC</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif}
        body{background:#f0f4f8;padding:20px}
        .container{max-width:600px;margin:0 auto;background:white;border-radius:20px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
        h1{color:#b22222;margin-bottom:20px;border-left:4px solid #b22222;padding-left:15px}
        label{font-weight:600;display:block;margin-top:15px;margin-bottom:5px;color:#333}
        input,select,textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:14px}
        button{background:#b22222;color:white;border:none;padding:14px;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:20px;width:100%}
        button:hover{background:#8b0000}
        .back-link{display:inline-block;margin-bottom:20px;color:#b22222;text-decoration:none}
        .error{color:red;font-size:12px;margin-top:5px}
        hr{margin:20px 0}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <a href="muscrec-student.html" class="back-link">← Back to Dashboard</a>
        <h1>📝 Complete Your Hostel Booking</h1>
        <form id="bookingForm">
            <input type="hidden" id="hostelId">
            <input type="hidden" id="hostelName">
            <input type="hidden" id="hostelPrice">
            <input type="hidden" id="landlordContact">

            <label>Full Name *</label>
            <input type="text" id="fullName" required>

            <label>Gender *</label>
            <select id="gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>

            <label>Phone Number *</label>
            <input type="tel" id="phone" required>

            <label>Program of Study *</label>
            <input type="text" id="program" placeholder="e.g., Bachelor of Education ICT" required>

            <label>Registration Number (optional)</label>
            <input type="text" id="regNumber" placeholder="e.g., 2024-ICT-001">

            <label>Home Address (Town/Village) *</label>
            <input type="text" id="homeAddress" required>

            <label>Date of Arrival *</label>
            <input type="date" id="arrivalDate" required>

            <label>Profile Photo (optional)</label>
            <input type="file" id="profilePhoto" accept="image/*">

            <button type="button" onclick="submitBooking()">Confirm Booking & Generate PDF</button>
        </form>
        <div id="errorMsg" class="error" style="margin-top:10px"></div>
    </div>

    <script>
        // Load hostel data from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const hostelId = urlParams.get('id');
        const hostelName = decodeURIComponent(urlParams.get('name') || '');
        const hostelPrice = urlParams.get('price');
        
        if (!hostelId) {
            alert('No hostel selected. Redirecting...');
            window.location.href = 'muscrec-student.html';
        }
        
        document.getElementById('hostelId').value = hostelId;
        document.getElementById('hostelName').value = hostelName;
        document.getElementById('hostelPrice').value = hostelPrice;
        
        // Fetch landlord contact from backend (or use stored)
        async function fetchLandlordContact() {
            try {
                const res = await fetch(`/api/muscrec/hostels/${hostelId}`);
                const hostel = await res.json();
                if (hostel && hostel.contacts) {
                    document.getElementById('landlordContact').value = hostel.contacts;
                } else {
                    document.getElementById('landlordContact').value = 'Not available';
                }
            } catch(e) {
                document.getElementById('landlordContact').value = 'Could not fetch';
            }
        }
        fetchLandlordContact();

        async function submitBooking() {
            // Validate required fields
            const fullName = document.getElementById('fullName').value.trim();
            const gender = document.getElementById('gender').value;
            const phone = document.getElementById('phone').value.trim();
            const program = document.getElementById('program').value.trim();
            const homeAddress = document.getElementById('homeAddress').value.trim();
            const arrivalDate = document.getElementById('arrivalDate').value;
            
            if (!fullName || !phone || !program || !homeAddress || !arrivalDate) {
                document.getElementById('errorMsg').innerText = 'Please fill all required fields (*)';
                return;
            }
            
            // Generate unique booking reference
            const ref = 'MZB' + Date.now().toString().slice(-8) + Math.floor(Math.random() * 1000);
            
            // Prepare booking data for backend
            const bookingData = {
                hostelId: parseInt(hostelId),
                name: fullName,
                phone: phone,
                homeAddress: homeAddress,
                arrivalDate: arrivalDate,
                sex: gender,
                program: program,
                regNumber: document.getElementById('regNumber').value.trim(),
                bookingRef: ref
            };
            
            // Optional: submit to backend (store booking)
            try {
                const backendRes = await fetch('/api/muscrec/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingData)
                });
                const backendData = await backendRes.json();
                if (!backendData.success) {
                    console.warn('Backend storage failed:', backendData.error);
                }
            } catch(e) { console.warn('Could not store booking:', e); }
            
            // Generate PDF with all details
            generatePDF(ref, {
                hostelName: document.getElementById('hostelName').value,
                price: document.getElementById('hostelPrice').value,
                landlordContact: document.getElementById('landlordContact').value,
                fullName, gender, phone, program, regNumber: document.getElementById('regNumber').value,
                homeAddress, arrivalDate
            });
        }
        
        async function generatePDF(ref, data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Add logo/title
            doc.setFontSize(22);
            doc.setTextColor(178, 34, 34);
            doc.text('MUSCREC HOSTEL BOOKING CONFIRMATION', 20, 20);
            doc.setFontSize(12);
            doc.setTextColor(0, 0, 0);
            doc.text(`Booking Reference: ${ref}`, 20, 35);
            doc.text(`Date: ${new Date().toLocaleString()}`, 20, 45);
            
            doc.setFontSize(14);
            doc.setTextColor(0, 0, 0);
            doc.text('STUDENT DETAILS', 20, 65);
            doc.setFontSize(11);
            doc.text(`Full Name: ${data.fullName}`, 20, 80);
            doc.text(`Gender: ${data.gender}`, 20, 90);
            doc.text(`Phone: ${data.phone}`, 20, 100);
            doc.text(`Program: ${data.program}`, 20, 110);
            if(data.regNumber) doc.text(`Reg Number: ${data.regNumber}`, 20, 120);
            doc.text(`Home Address: ${data.homeAddress}`, 20, 130);
            doc.text(`Arrival Date: ${data.arrivalDate}`, 20, 140);
            
            doc.setFontSize(14);
            doc.text('HOSTEL DETAILS', 20, 165);
            doc.setFontSize(11);
            doc.text(`Hostel: ${data.hostelName}`, 20, 180);
            doc.text(`Monthly Price: MK ${data.price}`, 20, 190);
            doc.text(`Landlord Contact: ${data.landlordContact}`, 20, 200);
            
            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text(`IMPORTANT: Pay booking fee to the landlord using the contact above.`, 20, 225);
            doc.text(`Quote your booking reference: ${ref}`, 20, 235);
            doc.text(`This is a provisional booking. Payment confirms your reservation.`, 20, 245);
            
            // Save PDF
            doc.save(`booking_${ref}.pdf`);
            
            // Show success message and redirect after a short delay
            alert(`Booking confirmed!\nYour reference: ${ref}\nDownloading PDF...\nContact landlord at ${data.landlordContact} to pay booking fee.`);
            window.location.href = 'muscrec-student.html';
        }
    </script>
</body>
</html>
