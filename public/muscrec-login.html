<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSCREC Services - Mzuzu University</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif}
        body{background:linear-gradient(135deg,#8b0000,#b22222,#dc143c);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{background:white;border-radius:32px;padding:40px 30px;width:100%;max-width:450px;box-shadow:0 25px 50px rgba(0,0,0,0.3)}
        .logo{text-align:center;margin-bottom:25px}
        .logo h1{color:#8b0000;font-size:1.8rem}
        .logo p{color:#b22222;font-size:0.8rem}
        .role-tabs{display:flex;gap:10px;margin-bottom:25px;background:#f0f4f8;border-radius:60px;padding:5px}
        .role-tab{flex:1;text-align:center;padding:12px;border-radius:40px;cursor:pointer;font-weight:bold}
        .role-tab.active{background:#b22222;color:white}
        .form-group{margin-bottom:18px}
        label{display:block;margin-bottom:6px;font-weight:600;color:#333;font-size:13px}
        input{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:14px;font-size:14px}
        button{width:100%;padding:14px;background:#b22222;color:white;border:none;border-radius:14px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px}
        .error{color:#dc2626;margin-top:12px;text-align:center;font-size:13px}
        .footer{margin-top:20px;text-align:center;font-size:11px;color:#666}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><h1>🎓 MUSCREC Services</h1><p>Mzuzu University Students Representative Council</p></div>
        <div class="role-tabs">
            <div class="role-tab active" onclick="setRole('official',this)">👤 Official</div>
            <div class="role-tab" onclick="setRole('student',this)">👩‍🎓 Student</div>
        </div>
        <form id="loginForm" onsubmit="event.preventDefault(); login();">
            <div class="form-group"><label>Username</label><input type="text" id="username" placeholder="Username"></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Password"></div>
            <button type="submit">Login →</button>
            <div id="errorMsg" class="error"></div>
        </form>
        <div class="footer">MUSCREC – Your Voice Matters</div>
    </div>
    <script>
        let currentRole = 'official';
        function setRole(role,el){
            currentRole = role;
            document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('errorMsg').innerHTML = '';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }
        async function login(){
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if(!username || !password){ document.getElementById('errorMsg').innerHTML = 'Enter username and password'; return; }
            const endpoint = currentRole === 'official' ? '/api/muscrec/official/login' : '/api/muscrec/student/login';
            try{
                const res = await fetch(endpoint, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
                const data = await res.json();
                if(data.success){
                    localStorage.setItem('muscrecUser', JSON.stringify(data));
                    window.location.href = currentRole === 'official' ? 'muscrec-dashboard.html' : 'muscrec-student.html';
                } else {
                    document.getElementById('errorMsg').innerHTML = data.error || 'Invalid credentials';
                }
            } catch(e){ document.getElementById('errorMsg').innerHTML = 'Connection error'; }
        }
    </script>
</body>
</html>
