<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Dashboard - Mzuzu University</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,'Segoe UI',Roboto,sans-serif}
        body{background:#f0f4f8;padding-bottom:40px}
        .navbar{background:#0a2b3e;color:white;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
        .logo{font-size:1.3rem;font-weight:bold}
        .logo span{color:#fdbb4d}
        .user-info{display:flex;gap:15px;align-items:center;flex-wrap:wrap}
        .badge{background:#fdbb4d;color:#0a2b3e;padding:6px 14px;border-radius:40px;font-size:12px;font-weight:bold}
        .logout-btn{background:#dc2626;border:none;padding:8px 20px;border-radius:40px;color:white;cursor:pointer}
        .container{max-width:1200px;margin:24px auto;padding:0 20px}
        
        .rooms-section{background:white;border-radius:28px;padding:24px;margin-bottom:30px}
        .rooms-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:20px}
        .create-room-btn{background:#10b981;color:white;border:none;padding:10px 20px;border-radius:40px;cursor:pointer;font-weight:bold}
        .rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
        .room-card{background:linear-gradient(135deg,#1a4a6f,#2c7da0);color:white;border-radius:20px;padding:20px;cursor:pointer;transition:transform 0.2s}
        .room-card:hover{transform:translateY(-5px)}
        .room-card h3{font-size:1.2rem;margin-bottom:8px}
        .room-card p{font-size:12px;opacity:0.9}
        .room-code{background:rgba(255,255,255,0.2);display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;margin-top:10px}
        .room-buttons{display:flex;gap:10px;margin-top:15px;flex-wrap:wrap}
        .live-btn{background:#ef4444;color:white;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:bold}
        .live-btn.active{background:#dc2626;animation:pulse 1.5s infinite}
        .delete-room{background:#64748b;border:none;padding:6px 12px;border-radius:20px;color:white;cursor:pointer;font-size:11px}
        @keyframes pulse{0%{opacity:1}50%{opacity:0.6}100%{opacity:1}}
        
        .live-stream-container{background:white;border-radius:28px;padding:24px;margin-bottom:30px;border:3px solid #ef4444}
        .live-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap}
        .live-title{color:#dc2626;font-size:1.3rem}
        .stop-live-btn{background:#dc2626;color:white;border:none;padding:10px 20px;border-radius:40px;cursor:pointer;font-weight:bold}
        .video-container{background:#0a2b3e;border-radius:20px;padding:20px;text-align:center}
        video{max-width:100%;border-radius:16px;background:#000}
        .video-controls{display:flex;gap:10px;justify-content:center;margin-top:15px;flex-wrap:wrap}
        .control-btn{background:#1a4a6f;color:white;border:none;padding:8px 16px;border-radius:40px;cursor:pointer}
        
        .general-section{background:white;border-radius:28px;padding:24px;margin-bottom:30px}
        .create-post{background:#f8fafc;border-radius:20px;padding:20px;margin-top:20px}
        .create-post input,.create-post textarea{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:14px;font-size:14px;margin-bottom:15px}
        .create-post textarea{min-height:100px;resize:vertical}
        .media-buttons{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}
        .media-btn{padding:8px 18px;border:none;border-radius:40px;cursor:pointer;font-weight:bold}
        .media-btn.voice{background:#8b5cf6;color:white}
        .media-btn.video{background:#ef4444;color:white}
        .media-btn.doc{background:#3b82f6;color:white}
        .media-btn.image{background:#10b981;color:white}
        .selected-media{background:#e0f2fe;padding:12px;border-radius:14px;margin-bottom:15px;display:flex;justify-content:space-between}
        .remove-media{background:#dc2626;color:white;border:none;padding:6px 14px;border-radius:40px;cursor:pointer}
        .submit-post{background:#0a2b3e;color:white;border:none;padding:12px 24px;border-radius:40px;cursor:pointer;font-weight:bold}
        .posts-container{background:white;border-radius:28px;padding:24px;margin-top:20px}
        .post-card{border:1px solid #e2e8f0;border-radius:20px;padding:20px;margin-bottom:20px}
        .post-title{font-size:1.2rem;font-weight:bold;color:#1a4a6f}
        .post-date{font-size:11px;color:#94a3b8;margin:8px 0}
        .post-media{margin:12px 0;background:#f8fafc;padding:12px;border-radius:16px}
        .post-media audio,.post-media video{max-width:100%}
        .post-media img{max-width:100%;border-radius:12px}
        .delete-post{background:#dc2626;color:white;border:none;padding:6px 16px;border-radius:40px;cursor:pointer;margin-top:10px}
        .empty-state{text-align:center;padding:40px;color:#94a3b8}
        .file-input{display:none}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:1000}
        .modal-content{background:white;border-radius:28px;padding:30px;width:90%;max-width:450px}
        .modal-content input,.modal-content textarea{width:100%;padding:12px;margin:10px 0;border-radius:14px;border:1px solid #ddd}
        .modal-buttons{display:flex;gap:10px;margin-top:20px}
        .modal-buttons button{flex:1;padding:12px;border-radius:40px;border:none;cursor:pointer}
        .save-room{background:#1a4a6f;color:white}
        .cancel-room{background:#e2e8f0}
        .back-btn{background:#64748b;color:white;border:none;padding:8px 16px;border-radius:40px;cursor:pointer;margin-bottom:15px}
        
        /* Screen share indicator */
        .share-active{background:#10b981;animation:pluse 1s infinite}
        @keyframes pluse{0%{opacity:1}50%{opacity:0.7}100%{opacity:1}}
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🎓 Mzuzu University <span>Lecturer Portal</span></div>
        <div class="user-info">
            <span class="badge" id="programBadge">Loading...</span>
            <span class="badge">Year <span id="levelBadge">-</span></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <!-- Live Stream Display Area -->
        <div id="liveStreamArea" style="display:none"></div>

        <!-- Rooms Section -->
        <div class="rooms-section">
            <div class="rooms-header">
                <h2>📚 My Course Rooms</h2>
                <button class="create-room-btn" onclick="showCreateRoomModal()">+ Create Course Room</button>
            </div>
            <div id="roomsList" class="rooms-grid">
                <div class="empty-state">Loading course rooms...</div>
            </div>
        </div>

        <!-- General Announcements Section -->
        <div class="general-section">
            <div class="section-title">
                <h2>📢 General Announcements</h2>
                <span style="font-size:12px;color:#666">(Visible to all students in your program)</span>
            </div>
            <div id="generalPostsArea"></div>
        </div>
    </div>

    <!-- Create Room Modal -->
    <div id="roomModal" class="modal">
        <div class="modal-content">
            <h3>📚 Create New Course Room</h3>
            <input type="text" id="courseCode" placeholder="Course Code (e.g., ICT2101)">
            <input type="text" id="courseName" placeholder="Course Name (e.g., Web Development)">
            <textarea id="courseDescription" placeholder="Course Description (optional)" rows="3"></textarea>
            <div class="modal-buttons">
                <button class="save-room" onclick="createCourseRoom()">Create Room</button>
                <button class="cancel-room" onclick="closeRoomModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentRoom = null;
        let selectedFile = null;
        let selectedMediaType = null;
        let localStream = null;
        let peerConnection = null;
        let isLiveActive = false;
        
        // WebRTC Configuration
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };
        
        try {
            currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser || currentUser.role !== 'lecturer') window.location.href = 'index.html';
        } catch(e) { window.location.href = 'index.html'; }
        
        document.getElementById('programBadge').innerHTML = currentUser.programName;
        document.getElementById('levelBadge').innerHTML = currentUser.level;
        
        async function loadRooms() {
            try {
                const res = await fetch(`/api/rooms/${currentUser.programCode}/${currentUser.level}`);
                const rooms = await res.json();
                const container = document.getElementById('roomsList');
                if (!rooms.length) {
                    container.innerHTML = '<div class="empty-state">📭 No course rooms yet. Click "Create Course Room" to get started.</div>';
                    return;
                }
                container.innerHTML = rooms.map(room => `
                    <div class="room-card">
                        <h3>📖 ${room.courseName}</h3>
                        <p><strong>${room.courseCode}</strong></p>
                        <p>${room.description || 'No description'}</p>
                        <div class="room-code">Created: ${room.createdAt}</div>
                        <div class="room-buttons">
                            <button class="live-btn" onclick="event.stopPropagation(); startLiveClass(${room.id}, '${room.courseName.replace(/'/g, "\\'")}')">📹 Start Live Class</button>
                            <button class="delete-room" onclick="event.stopPropagation(); deleteRoom(${room.id})">🗑️ Delete</button>
                        </div>
                        <div style="margin-top:10px">
                            <button onclick="event.stopPropagation(); selectRoom(${room.id}, '${room.courseName.replace(/'/g, "\\'")}', '${room.courseCode}')" style="background:rgba(255,255,255,0.3);border:none;padding:8px 12px;border-radius:20px;color:white;cursor:pointer;width:100%">📂 View Room Posts</button>
                        </div>
                    </div>
                `).join('');
                
                // Check for active live sessions
                for (const room of rooms) {
                    const statusRes = await fetch(`/api/live/status/${room.id}`);
                    const status = await statusRes.json();
                    if (status.active) {
                        showLiveStreamUI(room.id, room.courseName);
                    }
                }
            } catch(e) { console.error(e); }
        }
        
        async function startLiveClass(roomId, roomName) {
            try {
                // Request camera/microphone access
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                // Create video element for preview
                const videoElement = document.createElement('video');
                videoElement.srcObject = localStream;
                videoElement.autoplay = true;
                videoElement.playsInline = true;
                videoElement.muted = true;
                
                // Notify server that live class has started
                await fetch('/api/live/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomId, roomName, lecturerName: currentUser.name })
                });
                
                isLiveActive = true;
                showLiveStreamUI(roomId, roomName);
                
                // Store stream for peer connections
                window.currentLiveRoom = { id: roomId, stream: localStream };
                
                alert(`Live class started for ${roomName}! Students can now join.`);
            } catch(error) {
                console.error('Error starting live class:', error);
                alert('Could not access camera/microphone. Please check permissions.');
            }
        }
        
        async function stopLiveClass() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            await fetch('/api/live/stop', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomId: window.currentLiveRoom?.id })
            });
            
            isLiveActive = false;
            document.getElementById('liveStreamArea').style.display = 'none';
            window.currentLiveRoom = null;
            alert('Live class ended.');
        }
        
        async function shareScreen() {
            try {
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                // Replace video track with screen share
                const videoTrack = screenStream.getVideoTracks()[0];
                const sender = peerConnection?.getSenders().find(s => s.track?.kind === 'video');
                if (sender) {
                    sender.replaceTrack(videoTrack);
                }
                screenStream.getVideoTracks()[0].onended = () => {
                    // Restore camera when screen share ends
                    if (localStream) {
                        const cameraTrack = localStream.getVideoTracks()[0];
                        if (sender) sender.replaceTrack(cameraTrack);
                    }
                };
                alert('Screen sharing started!');
            } catch(error) {
                console.error('Screen share error:', error);
            }
        }
        
        function showLiveStreamUI(roomId, roomName) {
            document.getElementById('liveStreamArea').innerHTML = `
                <div class="live-stream-container">
                    <div class="live-header">
                        <h2 class="live-title">🔴 LIVE CLASS IN PROGRESS: ${roomName}</h2>
                        <button class="stop-live-btn" onclick="stopLiveClass()">⏹️ Stop Live Class</button>
                    </div>
                    <div class="video-container">
                        <video id="localVideo" autoplay playsinline muted style="width:100%;max-width:800px;border-radius:16px"></video>
                    </div>
                    <div class="video-controls">
                        <button class="control-btn" onclick="shareScreen()">🖥️ Share Screen</button>
                        <button class="control-btn" onclick="toggleMic()">🎤 Toggle Mic</button>
                        <button class="control-btn" onclick="toggleCamera()">📷 Toggle Camera</button>
                    </div>
                    <p style="text-align:center;margin-top:15px;color:#666">🔴 LIVE - Students can join this class now</p>
                </div>
            `;
            document.getElementById('liveStreamArea').style.display = 'block';
            const videoEl = document.getElementById('localVideo');
            if (localStream) videoEl.srcObject = localStream;
        }
        
        function toggleMic() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    alert(audioTrack.enabled ? 'Mic ON' : 'Mic OFF');
                }
            }
        }
        
        function toggleCamera() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    alert(videoTrack.enabled ? 'Camera ON' : 'Camera OFF');
                }
            }
        }
        
        async function selectRoom(roomId, roomName, roomCode) {
            currentRoom = { id: roomId, name: roomName, code: roomCode };
            document.getElementById('generalPostsArea').innerHTML = `
                <button class="back-btn" onclick="backToGeneral()">← Back to General Announcements</button>
                <div class="create-post">
                    <h3>📝 Post in: ${roomName} (${roomCode})</h3>
                    <input type="text" id="postTitle" placeholder="Title">
                    <textarea id="postContent" placeholder="Write your announcement..."></textarea>
                    <div class="media-buttons">
                        <button class="media-btn voice" onclick="selectFile('voice')">🎙️ Voice</button>
                        <button class="media-btn video" onclick="selectFile('video')">🎥 Video</button>
                        <button class="media-btn doc" onclick="selectFile('doc')">📄 Document</button>
                        <button class="media-btn image" onclick="selectFile('image')">🖼️ Image</button>
                    </div>
                    <input type="file" id="fileInput" class="file-input">
                    <div id="mediaPreview"></div>
                    <button class="submit-post" onclick="createPost(true)">📢 Post to ${roomName}</button>
                </div>
                <div class="posts-container">
                    <h3>📢 Posts in ${roomName}</h3>
                    <div id="roomPostsList"><div class="empty-state">Loading posts...</div></div>
                </div>
            `;
            document.getElementById('fileInput').onchange = function(e) {
                if (e.target.files[0]) {
                    selectedFile = e.target.files[0];
                    document.getElementById('mediaPreview').innerHTML = `<div class="selected-media"><span>📎 ${selectedFile.name}</span><button class="remove-media" onclick="clearMedia()">Remove</button></div>`;
                }
            };
            await loadRoomPosts(roomId);
        }
        
        async function loadRoomPosts(roomId) {
            try {
                const res = await fetch(`/api/posts/room/${roomId}`);
                const posts = await res.json();
                const container = document.getElementById('roomPostsList');
                if (!posts.length) {
                    container.innerHTML = '<div class="empty-state">📭 No posts in this room yet.</div>';
                    return;
                }
                container.innerHTML = posts.map(p => renderPostCard(p)).join('');
            } catch(e) { console.error(e); }
        }
        
        async function loadGeneralPosts() {
            try {
                const res = await fetch(`/api/posts/general/${currentUser.programCode}/${currentUser.level}`);
                const posts = await res.json();
                const container = document.getElementById('generalPostsArea');
                container.innerHTML = `
                    <div class="create-post">
                        <h3>📝 Create General Announcement</h3>
                        <input type="text" id="generalTitle" placeholder="Title">
                        <textarea id="generalContent" placeholder="Write your announcement..."></textarea>
                        <div class="media-buttons">
                            <button class="media-btn voice" onclick="selectFileGeneral('voice')">🎙️ Voice</button>
                            <button class="media-btn video" onclick="selectFileGeneral('video')">🎥 Video</button>
                            <button class="media-btn doc" onclick="selectFileGeneral('doc')">📄 Document</button>
                            <button class="media-btn image" onclick="selectFileGeneral('image')">🖼️ Image</button>
                        </div>
                        <input type="file" id="generalFileInput" class="file-input">
                        <div id="generalMediaPreview"></div>
                        <button class="submit-post" onclick="createPost(false)">📢 Post General Announcement</button>
                    </div>
                    <div class="posts-container">
                        <h3>📢 General Announcements</h3>
                        <div id="generalPostsList">${posts.length ? posts.map(p => renderPostCard(p)).join('') : '<div class="empty-state">📭 No general announcements yet.</div>'}</div>
                    </div>
                `;
                document.getElementById('generalFileInput').onchange = function(e) {
                    if (e.target.files[0]) {
                        window.generalFile = e.target.files[0];
                        document.getElementById('generalMediaPreview').innerHTML = `<div class="selected-media"><span>📎 ${window.generalFile.name}</span><button class="remove-media" onclick="clearGeneralMedia()">Remove</button></div>`;
                    }
                };
            } catch(e) { console.error(e); }
        }
        
        let generalFile = null;
        let generalMediaType = null;
        
        function selectFileGeneral(type) {
            generalMediaType = type;
            document.getElementById('generalFileInput').click();
        }
        
        function clearGeneralMedia() {
            generalFile = null;
            generalMediaType = null;
            document.getElementById('generalMediaPreview').innerHTML = '';
            document.getElementById('generalFileInput').value = '';
        }
        
        let roomFile = null;
        let roomMediaType = null;
        
        function selectFile(type) {
            roomMediaType = type;
            document.getElementById('fileInput').click();
        }
        
        function clearMedia() {
            roomFile = null;
            roomMediaType = null;
            document.getElementById('mediaPreview').innerHTML = '';
            document.getElementById('fileInput').value = '';
        }
        
        async function createPost(isRoomPost) {
            let title, content, mediaFile, mediaType;
            if (isRoomPost) {
                title = document.getElementById('postTitle').value.trim();
                content = document.getElementById('postContent').value.trim();
                mediaFile = roomFile;
                mediaType = roomMediaType;
            } else {
                title = document.getElementById('generalTitle').value.trim();
                content = document.getElementById('generalContent').value.trim();
                mediaFile = generalFile;
                mediaType = generalMediaType;
            }
            
            if (!title || !content) {
                alert('Please enter title and content');
                return;
            }
            
            const formData = new FormData();
            formData.append('programCode', currentUser.programCode);
            formData.append('level', currentUser.level);
            formData.append('title', title);
            formData.append('content', content);
            formData.append('lecturerName', currentUser.name);
            formData.append('mediaType', mediaType || '');
            if (isRoomPost && currentRoom) {
                formData.append('roomId', currentRoom.id);
                formData.append('roomName', currentRoom.name);
            }
            if (mediaFile) formData.append('mediaFile', mediaFile);
            
            try {
                const res = await fetch('/api/posts', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    if (isRoomPost) {
                        document.getElementById('postTitle').value = '';
                        document.getElementById('postContent').value = '';
                        clearMedia();
                        await loadRoomPosts(currentRoom.id);
                    } else {
                        document.getElementById('generalTitle').value = '';
                        document.getElementById('generalContent').value = '';
                        clearGeneralMedia();
                        await loadGeneralPosts();
                    }
                    alert('Post published successfully!');
                } else {
                    alert('Error publishing post');
                }
            } catch(e) { alert('Error publishing post'); }
        }
        
        async function deletePost(id) {
            if (confirm('Delete this post?')) {
                await fetch(`/api/posts/${id}`, { method: 'DELETE' });
                if (currentRoom) await loadRoomPosts(currentRoom.id);
                else await loadGeneralPosts();
            }
        }
        
        function renderPostCard(p) {
            let mediaHtml = '';
            if (p.media) {
                if (p.media.type === 'voice') mediaHtml = `<audio controls src="${p.media.url}"></audio>`;
                else if (p.media.type === 'video') mediaHtml = `<video controls src="${p.media.url}" width="100%"></video>`;
                else if (p.media.type === 'doc') mediaHtml = `<a href="${p.media.url}" target="_blank">📄 Download Document</a>`;
                else if (p.media.type === 'image') mediaHtml = `<img src="${p.media.url}" alt="Image">`;
            }
            return `
                <div class="post-card">
                    <div class="post-title">${escapeHtml(p.title)}</div>
                    <div class="post-date">📅 ${p.date}</div>
                    <div>${escapeHtml(p.content)}</div>
                    ${mediaHtml ? `<div class="post-media">${mediaHtml}</div>` : ''}
                    <button class="delete-post" onclick="deletePost(${p.id})">🗑️ Delete</button>
                </div>
            `;
        }
        
        function backToGeneral() {
            currentRoom = null;
            loadGeneralPosts();
        }
        
        function showCreateRoomModal() { document.getElementById('roomModal').style.display = 'flex'; }
        function closeRoomModal() { document.getElementById('roomModal').style.display = 'none'; }
        
        async function createCourseRoom() {
            const courseCode = document.getElementById('courseCode').value.trim();
            const courseName = document.getElementById('courseName').value.trim();
            const description = document.getElementById('courseDescription').value.trim();
            
            if (!courseCode || !courseName) {
                alert('Please enter Course Code and Course Name');
                return;
            }
            
            const res = await fetch('/api/rooms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    programCode: currentUser.programCode,
                    level: currentUser.level,
                    courseCode,
                    courseName,
                    lecturerName: currentUser.name,
                    description
                })
            });
            const data = await res.json();
            if (data.success) {
                closeRoomModal();
                document.getElementById('courseCode').value = '';
                document.getElementById('courseName').value = '';
                document.getElementById('courseDescription').value = '';
                loadRooms();
                alert(`Course room "${courseName}" created successfully!`);
            } else {
                alert('Error creating room');
            }
        }
        
        async function deleteRoom(roomId) {
            if (confirm('Delete this course room? All posts in it will be deleted too!')) {
                await fetch(`/api/rooms/${roomId}`, { method: 'DELETE' });
                if (currentRoom && currentRoom.id === roomId) backToGeneral();
                loadRooms();
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m == '&' ? '&amp;' : (m == '<' ? '&lt;' : '&gt;'));
        }
        
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        
        loadRooms();
        loadGeneralPosts();
    </script>
