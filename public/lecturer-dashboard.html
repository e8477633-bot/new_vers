<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Dashboard - Mzuzu University</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#f0f4f8;padding:20px}
        .navbar{background:#0a2b3e;color:white;padding:15px 20px;border-radius:20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
        .btn{background:#1a4a6f;color:white;border:none;padding:10px 20px;border-radius:10px;cursor:pointer}
        .btn-danger{background:#dc2626}
        .btn-success{background:#10b981}
        .card{background:white;border-radius:20px;padding:20px;margin-bottom:20px}
        input,textarea,select{width:100%;padding:10px;margin:10px 0;border-radius:10px;border:1px solid #ddd}
        .post-card{background:#f8fafc;padding:15px;border-radius:15px;margin-bottom:15px}
        .live-container{background:white;border-radius:20px;padding:20px;margin-bottom:20px;border:3px solid #ef4444}
        video{max-width:100%;border-radius:10px;background:#000}
        @media (max-width:600px){.navbar{flex-direction:column;gap:10px}}
    </style>
</head>
<body>
    <div class="navbar">
        <div style="font-weight:bold">🎓 Mzuzu University - Lecturer Portal</div>
        <div>
            <span id="programBadge"></span> | Year <span id="levelBadge"></span>
            <button class="btn btn-danger" onclick="logout()" style="margin-left:15px;padding:5px 15px">Logout</button>
        </div>
    </div>

    <!-- Live Class Section -->
    <div id="liveSection" class="live-container" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:15px">
            <h2 style="color:#dc2626">🔴 LIVE CLASS: <span id="liveCourseName"></span></h2>
            <button class="btn btn-danger" onclick="stopLiveClass()">Stop Live Class</button>
        </div>
        <video id="localVideo" autoplay playsinline muted style="width:100%"></video>
        <div style="margin-top:15px;text-align:center">
            <button class="btn" onclick="toggleMic()">🎤 Toggle Mic</button>
            <button class="btn" onclick="toggleCamera()">📷 Toggle Camera</button>
            <button class="btn btn-success" onclick="shareScreen()">🖥️ Share Screen</button>
        </div>
        <p style="text-align:center;margin-top:15px;color:#ef4444;font-weight:bold">🔴 LIVE - Students can join now</p>
    </div>

    <!-- Start Live Class Section -->
    <div class="card">
        <h3>📹 Start Live Class</h3>
        <input type="text" id="liveCourseNameInput" placeholder="Course Name (e.g., Web Development)">
        <input type="text" id="lecturerNameInput" placeholder="Your Name" value="Prof. Emmanuel">
        <button class="btn btn-success" onclick="startLiveClass()">Start Live Class</button>
    </div>

    <!-- Post Announcement Section -->
    <div class="card">
        <h3>📝 Post Announcement</h3>
        <input type="text" id="announcementTitle" placeholder="Title">
        <textarea id="announcementContent" placeholder="Write your announcement..." rows="3"></textarea>
        <input type="file" id="announcementFile">
        <button class="btn btn-success" onclick="postAnnouncement()">Post Announcement</button>
    </div>

    <!-- Upload Material Section -->
    <div class="card">
        <h3>📤 Upload Course Material</h3>
        <input type="text" id="materialTitle" placeholder="Material Title">
        <textarea id="materialDesc" placeholder="Description" rows="2"></textarea>
        <select id="materialType">
            <option value="document">Document</option>
            <option value="video">Video</option>
            <option value="audio">Audio</option>
            <option value="image">Image</option>
        </select>
        <input type="file" id="materialFile">
        <button class="btn btn-success" onclick="uploadMaterial()">Upload Material</button>
    </div>

    <!-- Create Assignment Section -->
    <div class="card">
        <h3>📝 Create Assignment</h3>
        <input type="text" id="assignmentTitle" placeholder="Assignment Title">
        <textarea id="assignmentDesc" placeholder="Instructions" rows="3"></textarea>
        <input type="date" id="assignmentDueDate">
        <input type="number" id="assignmentPoints" placeholder="Total Points">
        <input type="file" id="assignmentFile">
        <button class="btn btn-success" onclick="createAssignment()">Create Assignment</button>
    </div>

    <!-- Announcements List -->
    <div class="card">
        <h3>📢 Announcements</h3>
        <div id="announcementsList">Loading...</div>
    </div>

    <!-- Materials List -->
    <div class="card">
        <h3>📁 Course Materials</h3>
        <div id="materialsList">Loading...</div>
    </div>

    <!-- Assignments List -->
    <div class="card">
        <h3>📝 Assignments</h3>
        <div id="assignmentsList">Loading...</div>
    </div>

    <script>
        let currentUser = null;
        let localStream = null;
        let ws = null;
        let peerConnection = null;
        let isLiveActive = false;
        
        try {
            currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser || currentUser.role !== 'lecturer') window.location.href = 'index.html';
        } catch(e) { window.location.href = 'index.html'; }
        
        document.getElementById('programBadge').innerHTML = currentUser.programName || currentUser.programCode;
        document.getElementById('levelBadge').innerHTML = currentUser.level;
        
        async function startLiveClass() {
            const courseName = document.getElementById('liveCourseNameInput').value.trim();
            const lecturerName = document.getElementById('lecturerNameInput').value.trim();
            
            if (!courseName) {
                alert('Please enter the course name');
                return;
            }
            
            try {
                // Get camera access
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                // Setup WebSocket
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${window.location.host}`);
                
                ws.onopen = () => {
                    console.log('WebSocket connected');
                    ws.send(JSON.stringify({ type: 'lecturer-ready', streamId: Date.now().toString() }));
                };
                
                ws.onmessage = async (event) => {
                    const data = JSON.parse(event.data);
                    console.log('Received:', data.type);
                    
                    if (data.type === 'student-ready') {
                        // Create peer connection for student
                        if (!peerConnection) {
                            peerConnection = new RTCPeerConnection({
                                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                            });
                            
                            localStream.getTracks().forEach(track => {
                                peerConnection.addTrack(track, localStream);
                            });
                            
                            peerConnection.onicecandidate = (event) => {
                                if (event.candidate) {
                                    ws.send(JSON.stringify({
                                        type: 'ice-candidate',
                                        candidate: event.candidate,
                                        target: 'student'
                                    }));
                                }
                            };
                        }
                        
                        const offer = await peerConnection.createOffer();
                        await peerConnection.setLocalDescription(offer);
                        ws.send(JSON.stringify({ type: 'offer', offer: offer }));
                    }
                    
                    if (data.type === 'answer') {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    }
                    
                    if (data.type === 'ice-candidate') {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    }
                };
                
                // Notify server
                await fetch('/api/live/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ courseName, lecturerName })
                });
                
                document.getElementById('liveCourseName').innerText = courseName;
                document.getElementById('liveSection').style.display = 'block';
                document.getElementById('localVideo').srcObject = localStream;
                isLiveActive = true;
                
                alert(`✅ Live class "${courseName}" started! Students can now join.`);
                
            } catch(e) {
                console.error(e);
                alert('Could not access camera: ' + e.message);
            }
        }
        
        async function stopLiveClass() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (ws) ws.send(JSON.stringify({ type: 'stop-broadcast' }));
            if (ws) ws.close();
            if (peerConnection) peerConnection.close();
            
            await fetch('/api/live/stop', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
            
            document.getElementById('liveSection').style.display = 'none';
            isLiveActive = false;
            alert('Live class ended.');
        }
        
        function toggleMic() {
            if (localStream) {
                const track = localStream.getAudioTracks()[0];
                if (track) { track.enabled = !track.enabled; alert(track.enabled ? 'Mic ON' : 'Mic OFF'); }
            }
        }
        
        function toggleCamera() {
            if (localStream) {
                const track = localStream.getVideoTracks()[0];
                if (track) { track.enabled = !track.enabled; alert(track.enabled ? 'Camera ON' : 'Camera OFF'); }
            }
        }
        
        // FIXED: Share Screen function with better browser support
        async function shareScreen() {
            // Check if screen sharing is supported
            if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
                alert('Screen sharing is not supported on this browser.\n\nPlease use:\n- Google Chrome (Android or Desktop)\n- Microsoft Edge\n- Firefox (Desktop only)\n\nSafari on iOS does not support screen sharing.');
                return;
            }
            
            try {
                // Try to get screen stream
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: true,
                    audio: false 
                });
                
                const videoEl = document.getElementById('localVideo');
                if (videoEl) {
                    // Show screen share in local preview
                    videoEl.srcObject = screenStream;
                }
                
                // Replace video track in peer connection
                const sender = peerConnection?.getSenders().find(s => s.track?.kind === 'video');
                const screenTrack = screenStream.getVideoTracks()[0];
                
                if (sender && screenTrack) {
                    sender.replaceTrack(screenTrack);
                }
                
                // When screen sharing ends, switch back to camera
                screenTrack.onended = () => {
                    if (localStream && videoEl) {
                        videoEl.srcObject = localStream;
                    }
                    const cameraTrack = localStream?.getVideoTracks()[0];
                    if (sender && cameraTrack) {
                        sender.replaceTrack(cameraTrack);
                    }
                    alert('Screen sharing stopped. Camera resumed.');
                };
                
                alert('Screen sharing started! Students can now see your screen.');
                
            } catch(e) {
                console.error('Screen share error:', e);
                if (e.name === 'NotAllowedError') {
                    alert('Screen sharing permission denied. Please allow screen recording when prompted.');
                } else if (e.name === 'NotFoundError') {
                    alert('No screen capture source selected.');
                } else {
                    alert('Screen share failed: ' + e.message);
                }
            }
        }
        
        // Content management functions
        async function loadContent() {
            await loadAnnouncements();
            await loadMaterials();
            await loadAssignments();
        }
        
        async function loadAnnouncements() {
            try {
                const res = await fetch(`/api/posts/general/${currentUser.programCode}/${currentUser.level}`);
                const posts = await res.json();
                const textPosts = posts.filter(p => !p.media);
                const container = document.getElementById('announcementsList');
                if (!textPosts.length) { container.innerHTML = '<p>No announcements yet.</p>'; return; }
                container.innerHTML = textPosts.map(p => `
                    <div class="post-card">
                        <strong>📢 ${escapeHtml(p.title)}</strong><br>
                        <small>${escapeHtml(p.lecturerName)} • ${p.date}</small>
                        <p>${escapeHtml(p.content)}</p>
                        <button onclick="deletePost(${p.id})" style="background:#dc2626;color:white;border:none;padding:5px 12px;border-radius:10px;margin-top:10px;cursor:pointer">Delete</button>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }
        
        async function loadMaterials() {
            try {
                const res = await fetch(`/api/posts/general/${currentUser.programCode}/${currentUser.level}`);
                const posts = await res.json();
                const materials = posts.filter(p => p.media && !p.dueDate);
                const container = document.getElementById('materialsList');
                if (!materials.length) { container.innerHTML = '<p>No materials yet.</p>'; return; }
                container.innerHTML = materials.map(m => `
                    <div class="post-card">
                        <strong>📁 ${escapeHtml(m.title)}</strong>
                        <p>${escapeHtml(m.content)}</p>
                        ${renderMedia(m.media)}
                        <button onclick="deletePost(${m.id})" style="background:#dc2626;color:white;border:none;padding:5px 12px;border-radius:10px;margin-top:10px;cursor:pointer">Delete</button>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }
        
        async function loadAssignments() {
            try {
                const res = await fetch(`/api/posts/general/${currentUser.programCode}/${currentUser.level}`);
                const posts = await res.json();
                const assignments = posts.filter(p => p.dueDate);
                const container = document.getElementById('assignmentsList');
                if (!assignments.length) { container.innerHTML = '<p>No assignments yet.</p>'; return; }
                container.innerHTML = assignments.map(a => `
                    <div class="post-card">
                        <strong>📝 ${escapeHtml(a.title)}</strong><br>
                        <small>Due: ${a.dueDate || 'No due date'} | Points: ${a.points || 'N/A'}</small>
                        <p>${escapeHtml(a.content)}</p>
                        ${a.media ? renderMedia(a.media) : ''}
                        <button onclick="deletePost(${a.id})" style="background:#dc2626;color:white;border:none;padding:5px 12px;border-radius:10px;margin-top:10px;cursor:pointer">Delete</button>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }
        
        async function postAnnouncement() {
            const title = document.getElementById('announcementTitle').value.trim();
            const content = document.getElementById('announcementContent').value.trim();
            const file = document.getElementById('announcementFile').files[0];
            if (!title || !content) { alert('Enter title and content'); return; }
            const formData = new FormData();
            formData.append('programCode', currentUser.programCode);
            formData.append('level', currentUser.level);
            formData.append('title', title);
            formData.append('content', content);
            formData.append('lecturerName', currentUser.fullname || currentUser.name);
            if (file) formData.append('mediaFile', file);
            const res = await fetch('/api/posts', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) {
                document.getElementById('announcementTitle').value = '';
                document.getElementById('announcementContent').value = '';
                document.getElementById('announcementFile').value = '';
                loadContent();
                alert('Posted!');
            } else { alert('Error posting'); }
        }
        
        async function uploadMaterial() {
            const title = document.getElementById('materialTitle').value.trim();
            const desc = document.getElementById('materialDesc').value.trim();
            const type = document.getElementById('materialType').value;
            const file = document.getElementById('materialFile').files[0];
            if (!title || !file) { alert('Enter title and select file'); return; }
            const formData = new FormData();
            formData.append('programCode', currentUser.programCode);
            formData.append('level', currentUser.level);
            formData.append('title', title);
            formData.append('content', desc);
            formData.append('lecturerName', currentUser.fullname || currentUser.name);
            formData.append('mediaType', type);
            formData.append('mediaFile', file);
            const res = await fetch('/api/posts', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) {
                document.getElementById('materialTitle').value = '';
                document.getElementById('materialDesc').value = '';
                document.getElementById('materialFile').value = '';
                loadContent();
                alert('Uploaded!');
            } else { alert('Error uploading'); }
        }
        
        async function createAssignment() {
            const title = document.getElementById('assignmentTitle').value.trim();
            const desc = document.getElementById('assignmentDesc').value.trim();
            const dueDate = document.getElementById('assignmentDueDate').value;
            const points = document.getElementById('assignmentPoints').value;
            const file = document.getElementById('assignmentFile').files[0];
            if (!title) { alert('Enter title'); return; }
            const formData = new FormData();
            formData.append('programCode', currentUser.programCode);
            formData.append('level', currentUser.level);
            formData.append('title', title);
            formData.append('content', desc);
            formData.append('lecturerName', currentUser.fullname || currentUser.name);
            formData.append('dueDate', dueDate);
            formData.append('points', points);
            if (file) formData.append('mediaFile', file);
            const res = await fetch('/api/posts', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) {
                document.getElementById('assignmentTitle').value = '';
                document.getElementById('assignmentDesc').value = '';
                document.getElementById('assignmentDueDate').value = '';
                document.getElementById('assignmentPoints').value = '';
                document.getElementById('assignmentFile').value = '';
                loadContent();
                alert('Assignment created!');
            } else { alert('Error creating assignment'); }
        }
        
        async function deletePost(id) {
            if (confirm('Delete this item?')) {
                await fetch(`/api/posts/${id}`, { method: 'DELETE' });
                loadContent();
            }
        }
        
        function renderMedia(media) {
            if (!media) return '';
            if (media.type === 'audio') return `<audio controls src="${media.url}"></audio>`;
            if (media.type === 'video') return `<video controls src="${media.url}" width="100%"></video>`;
            if (media.type === 'image') return `<img src="${media.url}" style="max-width:100%;border-radius:10px">`;
            return `<a href="${media.url}" target="_blank">📄 Download ${media.filename || 'Document'}</a>`;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m == '&' ? '&amp;' : (m == '<' ? '&lt;' : '&gt;'));
        }
        
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        
        loadContent();
        setInterval(loadContent, 10000);
    </script>
</body>
</html>
