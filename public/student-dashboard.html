<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Mzuzu University</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,'Segoe UI',Roboto,sans-serif}
        body{background:#f0f4f8;padding-bottom:40px}
        .navbar{background:#0a2b3e;color:white;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
        .logo{font-size:1.3rem;font-weight:bold}
        .logo span{color:#fdbb4d}
        .user-info{display:flex;gap:15px;align-items:center;flex-wrap:wrap}
        .badge{background:#10b981;color:white;padding:6px 14px;border-radius:40px;font-size:12px;font-weight:bold}
        .logout-btn{background:#dc2626;border:none;padding:8px 20px;border-radius:40px;color:white;cursor:pointer}
        .container{max-width:1000px;margin:24px auto;padding:0 20px}
        .welcome-card{background:linear-gradient(135deg,#1a4a6f,#2c7da0);color:white;padding:30px;border-radius:28px;margin-bottom:30px}
        .readonly-badge{background:#10b981;color:white;padding:6px 14px;border-radius:40px;font-size:12px;display:inline-block;margin-top:12px}
        .posts-container{background:white;border-radius:28px;padding:24px}
        .posts-container h3{color:#0a2b3e;margin-bottom:20px}
        .post-card{border:1px solid #e2e8f0;border-radius:20px;padding:20px;margin-bottom:20px;background:#fafcff}
        .post-title{font-size:1.2rem;font-weight:bold;color:#1a4a6f;margin-bottom:8px}
        .post-date{font-size:11px;color:#94a3b8;margin-bottom:12px}
        .post-lecturer{color:#2c7da0;font-weight:600;margin-bottom:8px}
        .post-content{color:#334155;line-height:1.5;margin-bottom:12px}
        .post-media{margin:12px 0;background:#f8fafc;padding:12px;border-radius:16px}
        .post-media audio,.post-media video{max-width:100%;border-radius:12px}
        .post-media img{max-width:100%;border-radius:12px}
        .post-media a{color:#3b82f6;text-decoration:none}
        .empty-state{text-align:center;padding:40px;color:#94a3b8}
        .contact{background:#fff3cd;border-radius:16px;padding:15px;margin-top:20px;font-size:11px;color:#856404;text-align:center}
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🎓 Mzuzu University <span>Student Portal</span></div>
        <div class="user-info">
            <span class="badge" id="programBadge">Loading...</span>
            <span class="badge">Year <span id="levelBadge">-</span></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="welcome-card">
            <h2>👋 Welcome, <span id="studentName">Student</span>!</h2>
            <p>You are in <strong>Read-Only Mode</strong>. View announcements from your lecturers below.</p>
            <span class="readonly-badge">🔒 Read Only</span>
        </div>

        <div class="posts-container">
            <h3>📢 Announcements from Lecturers</h3>
            <div id="postsList"><div class="empty-state">Loading announcements...</div></div>
        </div>
        
        <div class="contact">
            📞 <strong>For Queries:</strong> Emmanuel Chimombo 0891011842 | e8477633@gmail.com
        </div>
    </div>

    <script>
        let currentUser = null;
        
        try {
            currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser || currentUser.role !== 'student') window.location.href = 'index.html';
        } catch(e) { window.location.href = 'index.html'; }
        
        document.getElementById('studentName').innerHTML = currentUser.programName || 'Student';
        document.getElementById('programBadge').innerHTML = currentUser.programName || currentUser.programCode;
        document.getElementById('levelBadge').innerHTML = currentUser.level;
        
        async function loadPosts() {
            try {
                const res = await fetch(`/api/posts/${currentUser.programCode}/${currentUser.level}`);
                const posts = await res.json();
                const container = document.getElementById('postsList');
                
                if (!posts.length) {
                    container.innerHTML = '<div class="empty-state">📭 No announcements yet.</div>';
                    return;
                }
                
                let html = '';
                for (let i = 0; i < posts.length; i++) {
                    const p = posts[i];
                    let mediaHtml = '';
                    if (p.media) {
                        if (p.media.type === 'voice') mediaHtml = `<audio controls src="${p.media.url}"></audio>`;
                        else if (p.media.type === 'video') mediaHtml = `<video controls src="${p.media.url}" width="100%"></video>`;
                        else if (p.media.type === 'doc') mediaHtml = `<a href="${p.media.url}" target="_blank">📄 Download Document</a>`;
                        else if (p.media.type === 'image') mediaHtml = `<img src="${p.media.url}" alt="Image">`;
                    }
                    html += `
                        <div class="post-card">
                            <div class="post-title">${escapeHtml(p.title)}</div>
                            <div class="post-date">📅 ${p.date}</div>
                            <div class="post-lecturer">👨‍🏫 By: ${escapeHtml(p.lecturerName)}</div>
                            <div class="post-content">${escapeHtml(p.content)}</div>
                            ${mediaHtml ? `<div class="post-media">${mediaHtml}</div>` : ''}
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch(e) { console.error(e); }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m == '&' ? '&amp;' : (m == '<' ? '&lt;' : '&gt;'));
        }
        
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        
        loadPosts();
        setInterval(loadPosts, 10000);
    </script>
</body>
</html>
