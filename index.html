<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mzuzu University Portal</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:linear-gradient(135deg,#0a2b3e,#1a4a6f);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{background:white;border-radius:20px;padding:40px;width:100%;max-width:450px;text-align:center}
        h1{color:#0a2b3e;margin-bottom:10px}
        input,select{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ddd}
        button{width:100%;padding:12px;background:#1a4a6f;color:white;border:none;border-radius:10px;cursor:pointer;font-size:16px}
        .contact{background:#f5f5f5;padding:15px;border-radius:10px;margin-top:20px;font-size:12px}
        .error{color:red;margin-top:10px}
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Mzuzu University</h1>
        <p>Student - Lecturer Portal</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <select id="level">
            <option value="1">Year 1</option>
            <option value="2">Year 2</option>
            <option value="3">Year 3</option>
            <option value="4">Year 4</option>
        </select>
        <button onclick="login()">Login</button>
        <div id="errorMsg" class="error"></div>
        <div class="contact">
            <strong>📞 For Queries & Adjustments:</strong><br>
            Emmanuel Chimombo<br>
            Phone: 0891011842<br>
            Email: e8477633@gmail.com<br><br>
            ⚠️ Queries beyond mechanical errors must be directed to your Head of Department
        </div>
    </div>
    <script>
        function login() {
            var user = document.getElementById('username').value;
            var pass = document.getElementById('password').value;
            if(user === "lecturer_BED_ICT_l1" && pass === "lecturer123") {
                alert("Welcome Lecturer! Full portal access granted.");
            } else if(user === "student_BED_ICT_l1_1" && pass === "student123") {
                alert("Welcome Student! Read-only mode active.");
            } else {
                document.getElementById('errorMsg').innerHTML = "Invalid credentials. Use: lecturer_BED_ICT_l1 / lecturer123";
            }
        }
    </script>
</body>
</html>
